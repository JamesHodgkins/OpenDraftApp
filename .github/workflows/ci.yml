name: CI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test:
    name: pytest + pyright
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install system Qt dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libgl1 libglib2.0-0 libegl1 libxkbcommon-x11-0 \
            libdbus-1-3 libxcb-cursor0 xvfb

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install PySide6 pyright pytest

      - name: Run tests (headless)
        env:
          QT_QPA_PLATFORM: offscreen
          XDG_RUNTIME_DIR: /tmp/xdg-runtime
        run: |
          mkdir -p "$XDG_RUNTIME_DIR"
          chmod 700 "$XDG_RUNTIME_DIR"
          xvfb-run -a pytest

      - name: Run Pyright type-check
        run: |
          pyright --outputjson > pyright-report.json
          python - <<'PY'
          import json
          import pathlib
          import sys

          data = json.loads(pathlib.Path("pyright-report.json").read_text(encoding="utf-8"))
          errors = [
            d
            for d in data.get("generalDiagnostics", [])
            if d.get("severity") == "error"
          ]
          for entry in errors:
            start = entry.get("range", {}).get("start", {})
            line_number = int(start.get("line", 0)) + 1
            file_path = entry.get("file", "<unknown>")
            message = entry.get("message", "").strip()
            print(f"{file_path}:{line_number}: {message}")
          sys.exit(1 if errors else 0)
          PY
