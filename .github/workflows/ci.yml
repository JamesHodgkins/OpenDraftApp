name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test:
    name: pytest + pyright
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system Qt dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libgl1 libglib2.0-0 libegl1 libxkbcommon-x11-0 \
            libdbus-1-3 libxcb-cursor0 xvfb

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install PySide6 pyright pytest

      - name: Run tests (headless)
        env:
          QT_QPA_PLATFORM: offscreen
        run: pytest

      - name: Run Pyright type-check
        run: pyright --outputjson | python -c "
import json, sys
data = json.load(sys.stdin)
errors = [d for d in data.get('generalDiagnostics', []) if d['severity'] == 'error']
for e in errors:
    print(f\"{e['file']}:{e['range']['start']['line']+1}: {e['message']}\")
sys.exit(1 if errors else 0)
"
